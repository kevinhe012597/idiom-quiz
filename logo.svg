<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <!-- Book/page icon -->
  <g transform="translate(8, 6)">
    <!-- Back page -->
    <rect x="4" y="4" width="32" height="40" rx="3" fill="#3b82f6" opacity="0.3"/>
    <!-- Front page -->
    <rect x="0" y="0" width="32" height="40" rx="3" fill="#3b82f6"/>
    <!-- Text lines on page -->
    <line x1="7" y1="10" x2="25" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="7" y1="16" x2="21" y2="16" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="7" y1="22" x2="23" y2="22" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- Magnifying glass -->
    <circle cx="24" cy="30" r="7" fill="none" stroke="#1e40af" stroke-width="2.5"/>
    <line x1="29" y1="35" x2="34" y2="40" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="56" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="700" fill="#1e293b" letter-spacing="-0.5">Lexicon</text>
</svg>
