<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#3b82f6"/>
  <g transform="translate(40, 36)">
    <!-- Back page -->
    <rect x="8" y="8" width="72" height="88" rx="6" fill="white" opacity="0.3"/>
    <!-- Front page -->
    <rect x="0" y="0" width="72" height="88" rx="6" fill="white"/>
    <!-- Text lines -->
    <line x1="14" y1="22" x2="58" y2="22" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
    <line x1="14" y1="34" x2="50" y2="34" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="14" y1="46" x2="54" y2="46" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <!-- Magnifying glass -->
    <circle cx="56" cy="68" r="14" fill="none" stroke="#1e40af" stroke-width="5"/>
    <line x1="66" y1="78" x2="78" y2="90" stroke="#1e40af" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- L letter accent -->
  <text x="130" y="148" font-family="sans-serif" font-size="72" font-weight="800" fill="white" opacity="0.25">L</text>
</svg>
